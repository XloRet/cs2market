<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Advanced Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Зберігаємо стильовий мінімалізм -->
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header glass-panel">
            <div class="logo">
                <span class="logo-icon">🔥</span>
                <h1>CS2 <span class="highlight">Pro Search</span></h1>
            </div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Пошук (напр. Asiimov, Fade, Holographic)...">
                <button id="searchBtn" class="btn-primary">Шукати</button>
            </div>
        </header>

        <!-- Dynamic Select Filters -->
        <nav class="filters-bar glass-panel flex-wrap">
            <select id="categorySelect" class="custom-select">
                <option value="">Усі види предметів</option>
                <option value="rifle">Гвинтівки</option>
                <option value="sniper">Снайперська зброя</option>
                <option value="pistol">Пістолети</option>
                <option value="smg">СМГ</option>
                <option value="shotgun">Дробовики</option>
                <option value="machinegun">Кулемети</option>
                <option value="knife">Ножі</option>
                <option value="gloves">Рукавиці</option>
            </select>

            <select id="weaponSelect" class="custom-select" disabled>
                <option value="">Модель (Оберіть категорію)</option>
            </select>

            <select id="conditionSelect" class="custom-select">
                <option value="">Будь-який стан</option>
                <option value="Factory New">Factory New</option>
                <option value="Minimal Wear">Minimal Wear</option>
                <option value="Field-Tested">Field-Tested</option>
                <option value="Well-Worn">Well-Worn</option>
                <option value="Battle-Scarred">Battle-Scarred</option>
            </select>

            <select id="raritySelect" class="custom-select">
                <option value="">Будь-яка рідкість</option>
                <option value="Consumer Grade">Ширпотреб (Consumer Grade)</option>
                <option value="Industrial Grade">Промислове (Industrial Grade)</option>
                <option value="Mil-Spec Grade">Армійське (Mil-Spec Grade)</option>
                <option value="Restricted">Заборонене (Restricted)</option>
                <option value="Classified">Засекречене (Classified)</option>
                <option value="Covert">Таємне (Covert)</option>
                <option value="Contraband">Контрабанда (Contraband)</option>
            </select>

            <select id="featureSelect" class="custom-select">
                <option value="">Будь-яка особливість</option>
                <option value="StatTrak™">StatTrak™</option>
                <option value="Souvenir">Сувенірна</option>
                <option value="Normal">Звичайна (Без Stat/Souv)</option>
            </select>

            <select id="stickerSelect" class="custom-select">
                <option value="">Будь-яка наліпка</option>
                <option value="Titan">Titan</option>
                <option value="iBUYPOWER">iBUYPOWER</option>
                <option value="Reason Gaming">Reason Gaming</option>
                <option value="Natus Vincere">Natus Vincere</option>
                <option value="Virtus.Pro">Virtus.Pro</option>
                <option value="Crown (Foil)">Crown (Foil)</option>
                <option value="Howling Dawn">Howling Dawn</option>
            </select>

            <select id="tournamentSelect" class="custom-select">
                <option value="">Всі турніри / Без турніру</option>
                <option value="Katowice">Katowice</option>
                <option value="Cologne">Cologne</option>
                <option value="Boston">Boston</option>
                <option value="Stockholm">Stockholm</option>
                <option value="Antwerp">Antwerp</option>
                <option value="Paris">Paris</option>
                <option value="Atlanta">Atlanta</option>
                <option value="Krakow">Krakow</option>
            </select>

            <select id="yearSelect" class="custom-select">
                <option value="">Будь-який рік</option>
                <option value="2014">2014</option>
                <option value="2015">2015</option>
                <option value="2016">2016</option>
                <option value="2017">2017</option>
                <option value="2018">2018</option>
                <option value="2019">2019</option>
                <option value="2020">2020</option>
                <option value="2021">2021</option>
                <option value="2022">2022</option>
                <option value="2023">2023</option>
                <option value="2024">2024</option>
            </select>

            <div class="price-inputs">
                <input type="number" id="minPrice" placeholder="Від ($)">
                <span>-</span>
                <input type="number" id="maxPrice" placeholder="До ($)">
            </div>
        </nav>

        <main class="main-content">
            <section class="items-display">
                <div class="items-header">
                    <h2>Знайдено на ринку (<span id="resultsCount">0</span>) <span style="font-size: 0.9rem; font-weight: normal; color: var(--text-muted); margin-left:10px;">Для перевірки флоту використовується CSGOFloat</span></h2>
                </div>
                
                <div id="itemsGrid" class="items-grid">
                    <!-- Cards will be injected via JS -->
                </div>
                
                <div style="text-align: center; margin-top: 30px;">
                    <button id="loadMoreBtn" class="btn-primary" style="display: none; width: 250px; font-size: 1.1rem; border-radius: 50px;">
                        Завантажити ще 100
                    </button>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal Overlay -->
    <div id="itemModal" class="modal-overlay" style="display: none;">
        <div class="modal-content glass-panel">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div class="modal-body">
                <!-- Ліва частина: 3D iframe або велика картинка -->
                <div class="modal-left" id="modalLeft">
                    <!-- Заповнюється динамічно -->
                </div>
                <!-- Права частина: Інформація -->
                <div class="modal-right">
                    <h2 id="modalTitle" class="modal-title">Назва</h2>
                    <div id="modalType" class="modal-subtitle">Тип</div>
                    <div id="modalPrice" class="modal-price">Ціна</div>
                    
                    <div class="modal-section">
                        <div id="modalLore" class="modal-lore">Опис (Lore)</div>
                    </div>

                    <div class="modal-section" id="modalStickersSection" style="display:none;">
                        <h4>Наліпки на зброї:</h4>
                        <div id="modalStickers" class="modal-stickers-container"></div>
                    </div>

                    <div class="modal-section">
                        <div id="modalActions">
                            <!-- Float та Лінк в Грати -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
