<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Advanced Market</title>
    <meta name="description" content="Professional CS2 Market Search — find skins, stickers, knives by price, float, rarity and tournament.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">

        <!-- Header -->
        <header class="header glass-panel">
            <div class="logo">
                <div class="logo-icon-wrap">🔥</div>
                <div class="logo-text">
                    <h1>CS2 <span class="highlight">Pro Search</span></h1>
                    <span class="logo-sub" data-i18n="logoSub">Marketplace Explorer</span>
                </div>
            </div>

            <div class="search-bar">
                <div class="search-input-wrap">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                    <input type="text" id="searchInput" data-i18n-placeholder="searchPlaceholder" placeholder="Пошук (Asiimov, Fade, Holographic...)">
                </div>
                <button id="searchBtn" class="btn-primary" data-i18n="searchBtn">Шукати</button>
            </div>

            <div class="header-actions">
                <button id="langToggle" class="btn-lang" onclick="toggleLanguage()">
                    <span id="langFlag">🇬🇧</span>
                    <span id="langLabel">EN</span>
                </button>
            </div>
        </header>

        <!-- Filters -->
        <nav class="filters-bar glass-panel">
            <div class="filters-grid">

                <div class="filter-group">
                    <label class="filter-label" data-i18n="filterCategory">Категорія</label>
                    <select id="categorySelect" class="custom-select">
                        <option value="" data-i18n="optAllItems">Всі предмети</option>
                        <option value="rifle" data-i18n="optRifle">Гвинтівки</option>
                        <option value="sniper" data-i18n="optSniper">Снайперська</option>
                        <option value="pistol" data-i18n="optPistol">Пістолети</option>
                        <option value="smg" data-i18n="optSmg">СМГ</option>
                        <option value="shotgun" data-i18n="optShotgun">Дробовики</option>
                        <option value="machinegun" data-i18n="optMachinegun">Кулемети</option>
                        <option value="knife" data-i18n="optKnife">Ножі</option>
                        <option value="gloves" data-i18n="optGloves">Рукавиці</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label class="filter-label" data-i18n="filterModel">Модель</label>
                    <select id="weaponSelect" class="custom-select" disabled>
                        <option value="" data-i18n="optModelDefault">Модель (Будь-яка)</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label class="filter-label" data-i18n="filterCondition">Стан</label>
                    <select id="conditionSelect" class="custom-select">
                        <option value="" data-i18n="optAnyCondition">Будь-який стан</option>
                        <option value="Factory New">Factory New</option>
                        <option value="Minimal Wear">Minimal Wear</option>
                        <option value="Field-Tested">Field-Tested</option>
                        <option value="Well-Worn">Well-Worn</option>
                        <option value="Battle-Scarred">Battle-Scarred</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label class="filter-label" data-i18n="filterRarity">Рідкість</label>
                    <select id="raritySelect" class="custom-select">
                        <option value="" data-i18n="optAnyRarity">Будь-яка</option>
                        <option value="Consumer Grade" data-i18n="optConsumer">Ширпотреб</option>
                        <option value="Industrial Grade" data-i18n="optIndustrial">Промислове</option>
                        <option value="Mil-Spec Grade" data-i18n="optMilSpec">Армійське</option>
                        <option value="Restricted" data-i18n="optRestricted">Заборонене</option>
                        <option value="Classified" data-i18n="optClassified">Засекречене</option>
                        <option value="Covert" data-i18n="optCovert">Таємне</option>
                        <option value="Contraband" data-i18n="optContraband">Контрабанда</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label class="filter-label" data-i18n="filterFeature">Особливість</label>
                    <select id="featureSelect" class="custom-select">
                        <option value="" data-i18n="optAnyFeature">Будь-яка</option>
                        <option value="StatTrak™">StatTrak™</option>
                        <option value="Souvenir" data-i18n="optSouvenir">Сувенірна</option>
                        <option value="Normal" data-i18n="optNormal">Звичайна</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label class="filter-label" data-i18n="filterSticker">Наліпка</label>
                    <select id="stickerSelect" class="custom-select">
                        <option value="" data-i18n="optAnySticker">Будь-яка</option>
                        <option value="Titan">Titan</option>
                        <option value="iBUYPOWER">iBUYPOWER</option>
                        <option value="Reason Gaming">Reason Gaming</option>
                        <option value="Natus Vincere">Natus Vincere</option>
                        <option value="Virtus.Pro">Virtus.Pro</option>
                        <option value="Crown (Foil)">Crown (Foil)</option>
                        <option value="Howling Dawn">Howling Dawn</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label class="filter-label" data-i18n="filterTournament">Турнір</label>
                    <select id="tournamentSelect" class="custom-select">
                        <option value="" data-i18n="optAnyTournament">Всі турніри</option>
                        <option value="Katowice">Katowice</option>
                        <option value="Cologne">Cologne</option>
                        <option value="Boston">Boston</option>
                        <option value="Stockholm">Stockholm</option>
                        <option value="Antwerp">Antwerp</option>
                        <option value="Paris">Paris</option>
                        <option value="Atlanta">Atlanta</option>
                        <option value="Krakow">Krakow</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label class="filter-label" data-i18n="filterYear">Рік</label>
                    <select id="yearSelect" class="custom-select">
                        <option value="" data-i18n="optAnyYear">Будь-який</option>
                        <option value="2014">2014</option>
                        <option value="2015">2015</option>
                        <option value="2016">2016</option>
                        <option value="2017">2017</option>
                        <option value="2018">2018</option>
                        <option value="2019">2019</option>
                        <option value="2020">2020</option>
                        <option value="2021">2021</option>
                        <option value="2022">2022</option>
                        <option value="2023">2023</option>
                        <option value="2024">2024</option>
                    </select>
                </div>

                <div class="filter-group filter-group--price">
                    <label class="filter-label" data-i18n="filterPrice">Ціна ($)</label>
                    <div class="price-inputs">
                        <input type="number" id="minPrice" data-i18n-placeholder="priceFrom" placeholder="Від">
                        <span class="price-sep">—</span>
                        <input type="number" id="maxPrice" data-i18n-placeholder="priceTo" placeholder="До">
                    </div>
                </div>

            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <section class="items-display">
                <div class="items-header">
                    <div class="items-header-left">
                        <h2>
                            <span data-i18n="foundOnMarket">Знайдено на ринку</span>
                            <span class="results-badge" id="resultsCount">0</span>
                        </h2>
                        <span class="float-credit" data-i18n="floatCredit">Float перевіряється через CSGOFloat</span>
                    </div>
                </div>

                <div id="itemsGrid" class="items-grid"></div>

                <div class="load-more-wrap">
                    <button id="loadMoreBtn" class="btn-load-more" style="display: none;" data-i18n="loadMore">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
                        Завантажити ще 100
                    </button>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal Overlay -->
    <div id="itemModal" class="modal-overlay" style="display: none;" onclick="handleModalOverlayClick(event)">
        <div class="modal-content glass-panel">
            <button class="modal-close" onclick="closeModal()" title="Close">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
            <div class="modal-body">
                <div class="modal-left" id="modalLeft"></div>
                <div class="modal-right">
                    <div class="modal-info-top">
                        <div id="modalType" class="modal-subtitle"></div>
                        <h2 id="modalTitle" class="modal-title"></h2>
                        <div class="modal-price-row">
                            <div id="modalPrice" class="modal-price"></div>
                        </div>
                    </div>

                    <div class="modal-section" id="modalLoreSection">
                        <div class="modal-section-label" data-i18n="modalDescription">Опис</div>
                        <div id="modalLore" class="modal-lore"></div>
                    </div>

                    <div class="modal-section" id="modalStickersSection" style="display:none;">
                        <div class="modal-section-label" data-i18n="modalStickers">Наліпки на зброї</div>
                        <div id="modalStickers" class="modal-stickers-container"></div>
                    </div>

                    <div class="modal-section modal-section--actions" id="modalActionsSection">
                        <div id="modalActions"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
